# UIT_ROUND Fact Sheet
# Plain-language mapping of code to theory
# Source: UIT_ROUND.py v1.3.12 + benchmark suite
# Mathematical basis: U = x + εi (Unified Informatic Topology)

---

# THE NUMBER SPACE
# Every element in U has two parts: a classical value and a rotation.
# U = { z = x + εi | x ∈ R_limited, ε ∈ R_infinitesimal, i² = -1 }

number_space:
  name: "U-space (Unified Informatic Topology)"
  definition: "Each number has a real part (x) and a tiny rotational part (εi)"
  classical_part:
    symbol: "x"
    meaning: "The ordinary, measurable value — what you'd read off an instrument"
    range: "Bounded real numbers"
  infinitesimal_part:
    symbol: "εi"
    meaning: "A small rotation that encodes hidden structure the classical part alone can't see"
    epsilon: "How strongly the rotation influences the output (a small coupling constant)"
    i: "The rotational direction, represented as cos(φ) and sin(φ)"

---

# THE NEURON
# File: UIT_ROUND.py, class UITNeuronCell, line 18-102
# This is a single neuron that stores information as an angle (phase)
# and outputs a value modulated by that angle's harmonic projection.

neuron:
  name: "UITNeuronCell"
  what_it_does: "Receives an input, updates an internal angle, and produces an output that combines a standard value with a rotational signal"

  # The two gates (line 67-68)
  gates:
    how_computed: "Input and previous phase are linearly combined, then split into two halves"
    output_gate:
      code: "x_gate = first half of gates"
      formula: "standard_part = tanh(x_gate)"
      what_it_is: "The classical part (x). A bounded value between -1 and +1."
      maps_to: "x in U = x + εi"
    phase_gate:
      code: "phi_gate = second half of gates"
      formula: "phi_shift = sigmoid(phi_gate) × π × spin_multiplier"
      what_it_is: "How much to rotate the internal angle this step"
      range: "Between 0 and 2π (one full turn) when spin_multiplier = 2"

  # The phase (internal angle)
  phase:
    symbol: "φ (phi)"
    what_it_is: "An angle that accumulates over time — the neuron's memory"
    update_rule: "φ_next = φ_prev × persistence + sigmoid(gate) × π × M"
    lives_on: "A circle (mod 2π × M) — it wraps around, like a clock"
    why_it_matters: "Information is stored as angular position, not as a magnitude that can decay to zero"

  # Quantization (line 86-87)
  quantization:
    what_it_does: "Gently nudges the phase toward the nearest grid point (multiples of π/4)"
    strength: "Default 0.125 (12.5% pull toward grid)"
    why_it_matters: "Creates preferred resting positions — the phase settles into discrete basins instead of drifting freely"
    analogy: "Like a ball on a hilly landscape rolling into the nearest valley"

  # Harmonic projection (lines 90-94)
  harmonic_projection:
    what_it_does: "Reads the phase angle through multiple frequency lenses"
    formula: "h_cos = Σ weight[h] × cos(h × φ), h_sin = Σ weight[h] × sin(h × φ)"
    harmonics_list: "Default [1, 2, 4, 8] — like looking at the angle at 1×, 2×, 4×, 8× zoom"
    what_it_produces: "Two signals (cosine and sine) that represent the phase as a point on a circle"
    maps_to: "The 'i' in εi — this IS the rotational component"

  # The output (line 97) — THIS IS THE U-SPACE FORMULA
  output:
    formula: "output = standard_part × (1 + epsilon × h_cos)"
    plain_english: "The classical value, scaled by one plus a small rotational correction"
    maps_to: "U = x × (1 + εi) — the classical part modulated by the infinitesimal rotation"
    what_epsilon_does: "Controls how much the rotation affects the output (initialized small: 0.125 × 0.5^(j%5))"
    key_insight: "When the phase is locked (h_cos ≈ ±1), epsilon acts as a stable amplifier. When the phase is unlocked (h_cos oscillates), epsilon averages out and the output defaults to the classical part alone."

---

# INITIALIZATION
# File: UIT_ROUND.py, lines 45-64
# How the neuron starts before any training.

initialization:
  input_weights:
    method: "Random (Kaiming uniform)"
    why: "Standard practice for input connections"
  recurrent_weights:
    method: "All zeros"
    why: "The neuron starts with no recurrent memory — purely input-driven at first. Recurrence emerges through learning."
  bias:
    method: "First half zeros, second half spread evenly around the circle"
    formula: "bias[hidden + j] = j × (2π / hidden_size)"
    why: "Each neuron's phase gate starts at a different angle. This diversity means different neurons explore different parts of the circle from the very first step."
  epsilon:
    method: "Small values with exponential decay: 0.125 × 0.5^(j mod 5)"
    why: "The rotational coupling starts weak. The neuron must earn its influence through training."
  harmonic_weights:
    method: "Random uniform between 0 and 1"
    why: "Each neuron starts with a random mix of frequency sensitivities"

---

# REVERSIBILITY
# File: UIT_ROUND.py, lines 72-82 (binary alignment mode)
# The neuron has a special mode where encoding and decoding are exact inverses.

reversibility:
  encoding_direction:
    name: "Winding"
    formula: "φ_next = (φ_prev × 0.5) + (bit × π)"
    plain_english: "Halve the current angle, then add π if the bit is 1"
    what_it_does: "Packs a bitstream into a single angle, one bit at a time"
  decoding_direction:
    name: "Unwinding"
    formula: "bit = 1 if φ ≥ π, else 0. Then φ_next = (φ - bit × π) × 2"
    plain_english: "Read whether the angle is in the top or bottom half (that's the bit), subtract if needed, then double"
    what_it_does: "Extracts each bit back out of the angle, in reverse order"
  relationship: "These two operations are algebraic inverses. Encoding then decoding recovers the exact original bitstream."
  what_this_means: "Information stored as phase is not compressed or approximated. It is preserved exactly. Standard neural networks (GRU, LSTM) cannot do this because their activation functions (tanh, sigmoid) permanently destroy information."
  proven_by: "UIT_benchmark_crystalline_loop.py — 256 characters encoded and decoded bit-perfectly. GRU comparison: total failure."

  training_shortcut:
    claim: "Because the math inverts exactly, you can train the easy direction first, invert the learned weights, and use that as a starting point for the hard direction"
    expected_savings: "The hard direction converges in roughly 100 epochs instead of 3000-5000"
    why_this_works: "The inverted weights are already a near-perfect solution. Training just cleans up numerical noise."

---

# LOSS FUNCTIONS
# File: ROUND.py, lines 225-268 (HarmonicROUNDLoss)

loss_functions:
  task_loss:
    what_it_is: "Standard classification or regression error — how wrong is the answer?"
    types: "Binary cross-entropy (yes/no tasks) or cross-entropy (multiple choice tasks)"
  phase_lock_loss:
    formula: "Σ weight[h] × mean(sin²(h/2 × φ))"
    plain_english: "Measures how close the phase angles are to multiples of 2π/h (the poles of a sphere)"
    when_locked: "sin²(h/2 × φ) = 0 — the phase is exactly at a pole"
    when_unlocked: "sin²(h/2 × φ) is large — the phase is between poles"
    what_it_does: "Pushes phases toward discrete resting positions during training"
    connection_to_predictive_coding: "This IS a local prediction error signal. It says: 'I predict the phase should be at a pole. The error is how far away it is.' This mirrors the Kuramoto model of oscillator synchronization."
  total_loss:
    formula: "task_loss + lock_strength × lock_loss"
    lock_strength: "Default 0.1-0.13 — how hard the locking pulls"
    lock_delay: "Locking is disabled for the first N epochs, letting the model explore freely before settling"

---

# CONFIDENCE
# File: UIT_ROUND.py, line 96

confidence:
  formula: "mean(|h_cos|) / number_of_harmonics"
  what_it_measures: "How close to a pole the phase is"
  when_high: "The phase is locked — the neuron has settled into a stable state"
  when_low: "The phase is between poles — the neuron is still searching"
  used_for: "The loss is multiplied by (1 - confidence), so confident neurons learn less aggressively. This prevents over-correction of already-stable states."

---

# WHAT HAS BEEN PROVEN (Benchmark Suite)

verified_capabilities:

  sequential_logic:
    test: "Parity (4-bit, 8-bit, 16-bit)"
    what_it_does: "Count the number of 1-bits in a sequence, report even or odd"
    result: "100% accuracy on all lengths using a SINGLE NEURON"
    convergence_times:
      4_bit: "73 epochs with 1 neuron"
      8_bit: "238 epochs with 1 neuron"
      16_bit: "332 epochs with 1 neuron"
    scaling: "Convergence time scales roughly linearly with sequence length"
    key_discovery: "Parity is a 1-dimensional operation (counting mod 2 = one angle on one circle). One phase neuron is sufficient. Using 4 neurons actually caused intermittent failure because the neurons could interfere destructively — their phase contributions cancelled out. The problem literally requires one rotation."
    phase_transition: "Training shows a clear two-stage pattern: (1) the neuron finds the correct rotation (task loss drops, accuracy hits 100%), then (2) the lock loss drops sharply as the phase snaps into a discrete attractor basin. This is a discontinuous phase transition — the system discovers the solution first, then crystallizes it."
    why_it_matters: "One neuron tracking 16 sequential bits with 100% accuracy is impossible for any standard recurrent architecture. A GRU needs dozens of hidden units and still struggles. The phase representation makes the computation trivial because the representation IS the computation — counting mod 2 is rotation on a circle."
    proven_in: "round_bloch.html (JavaScript, interactive demo)"

  continuous_signals:
    test: "Sine wave reconstruction"
    what_it_does: "Learn to reproduce a sine wave from sequential input samples"
    result: "ROUND final MSE = 0.000032, GRU final MSE = 0.009978. ROUND is 312x more accurate. 100.00% fidelity vs 99.90%."
    why_it_matters: "Shows the phase representation handles continuous values with dramatically higher precision than standard networks. The phase naturally tracks oscillation because it IS an oscillation."
    proven_in: "UIT_benchmark_sine_waves.py"

  compositional_reasoning:
    test: "Color algebra (64-color mixing)"
    what_it_does: "Given two colors as input, predict their angular midpoint on a color wheel"
    result: "Converges to high accuracy"
    why_it_matters: "This is vector addition in phase space — the neuron is doing geometry, not lookup"
    proven_in: "UIT_benchmark_color_algebra.py"

  modular_algebra:
    test: "Prism stack (modular addition mod 18)"
    what_it_does: "Given two elements from a group of 18, predict their sum modulo 18"
    result: "ROUND converges to near-zero cross-entropy by epoch ~1300. GRU still above 1.0 after 2000 epochs."
    why_it_matters: "Modular arithmetic maps directly to phase wrapping. The neuron's geometry IS the algebraic structure of the problem. GRU has to learn modular arithmetic as an arbitrary function; ROUND has it built into the representation."
    proven_in: "UIT_benchmark_prism_stack.py"

  reversible_encoding:
    test: "ASCII encode/decode round-trip"
    what_it_does: "Encode 256 characters as phase angles, then decode them back to characters"
    result: "Bit-perfect reconstruction for all 256 characters"
    why_it_matters: "Proves lossless information storage. GRU fails completely on the same test."
    proven_in: "UIT_crystallize_encoder.py, UIT_benchmark_crystalline_loop.py"

  cross_model_relay:
    test: "Encoder-decoder relay (independently trained models)"
    what_it_does: "Decoder processes bits into hidden state. Separately trained encoder reconstructs bits from character identity. Tests whether independently trained models share a compatible phase dialect."
    result: "Bit-perfect relay for the phase-based model. GRU relay fails."
    why_it_matters: "The phase manifold's attractor structure forces independently trained models into compatible representations. The geometry itself acts as a shared communication protocol."
    proven_in: "UIT_benchmark_sandwich_duel.py"

---

# THE CORE CLAIM

core_claim:
  statement: "UIT_ROUND is a neural network whose internal representation IS the U-space number system. The classical output (x) and the infinitesimal rotation (εi) are not metaphors — they are the actual computed quantities at line 97 of UIT_ROUND.py."
  evidence:
    - "output = standard_part × (1 + epsilon × h_cos) maps directly to U = x(1 + εi)"
    - "Phase angles provide exact reversibility (encode/decode round-trip)"
    - "Lock loss functions as a local prediction error, matching Kuramoto synchronization dynamics"
    - "The quantization grid creates discrete attractor basins on a continuous manifold"
    - "Independently trained models converge to compatible phase representations"
  what_standard_networks_cannot_do:
    - "GRU/LSTM hidden states are lossy compressions — information is permanently destroyed by tanh/sigmoid"
    - "Standard networks cannot invert their own computation"
    - "Standard networks have no natural attractor structure — representations drift under perturbation"
    - "Standard networks require global backpropagation for all learning — no local update path"
