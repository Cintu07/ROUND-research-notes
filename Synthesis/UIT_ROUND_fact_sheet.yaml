# UIT_ROUND Fact Sheet
# Plain-language mapping of code to theory
# Source: UIT_ROUND.py v1.3.14 + benchmark suite
# Mathematical basis: U = x + εi (Unified Informatic Topology)
# Training method: Standard backpropagation through time (BPTT)

---
# THE NUMBER SPACE
# Every element in U has two parts: a classical value and a rotation.
# U = { z = x + εi | x ∈ R_limited, ε ∈ R_infinitesimal, i² = -1 }

number_space:
  name: "U-space (Unified Informatic Topology)"
  definition: "Numbers consist of two parts: a classical value and a rotational angle."
  classical_part:
    symbol: "x"
    meaning: "The measurable value, representing what a standard instrument would read."
    range: "Bounded real numbers."
  infinitesimal_part:
    symbol: "εi"
    meaning: "A small rotation that encodes a hidden structure that the classical part cannot see on its own."
    epsilon: "The coupling constant that determines how strongly the rotation affects the final output."
    i: "The rotational direction, calculated using cosine and sine projections of the internal angle."

---
# THE NEURON
# Implementation: UIT_ROUND.py (UITNeuronCell)
# This neuron stores information as an angle (phase) and outputs a value scaled by its harmonic projection.

neuron:
  name: "UITNeuronCell"
  function: "The neuron takes an input, updates its internal angle, and generates an output by combining a standard value with its rotational state."

  # Computation Gates
  gates:
    method: "The input and previous angle are combined linearly and then split into two parallel paths."
    classical_gate:
      key: "x_gate"
      formula: "value = tanh(x_gate)"
      meaning: "This is the classical part (x), keeping values bounded between -1 and +1."
    phasic_gate:
      key: "phi_gate"
      formula: "rotation = sigmoid(phi_gate) * pi * multiplier"
      meaning: "This determines the amount of rotation added to the internal angle at each step."
      multiplier: "Standard is 2.0 (one full turn) or 1.0 (half turn) depending on the configuration."

  # Internal Angle (Phase)
  phase:
    symbol: "φ (phi)"
    definition: "An angle that grows over time, acting as the neuron's primary memory."
    update_rule: "phi_next = (phi_prev * persistence) + rotation"
    persistence: "How much of the previous angle is kept. Pure memory uses 1.0, while tracking tasks may use 0.0."
    logic: "Information is stored as a position on a circle rather than a magnitude, meaning it never decays to zero or disappears."
    training: "Updates are calculated through standard backpropagation through time (BPTT)."

  # Snapping (Quantization)
  quantization:
    function: "This pulls the angle toward specific anchor points (like multiples of 45 degrees)."
    strength: "Default is 12.5%. It ensures the angle settles into stable basins instead of drifting aimlessly."
    analogy: "Like a marble rolling into a groove on a track."

  # Harmonic Projection
  harmonics:
    function: "Views the angle through multiple frequency lenses simultaneously."
    formula: "Points are projected onto a circle using cosine and sine across multiple harmonics."
    v1314_list: "Default harmonics are [1, 2, 4, 8]. Continuous tasks use [0.5] for wide-turn tracking."
    identity: "This provides the rotational component of the system."

  # Final Output (The U-Space Formula)
  output:
    formula: "output = classical_value * (1 + epsilon * harmonic_projection)"
    description: "The classical part is modulated by the rotation. The result is locked to a periodic state."
    epsilon: "Determines how much the angle affects the measurable output."
    torus_locking: "The output depends on the position of the angle on the circle, not the total number of turns made. This prevents errors that occur when values grow too large over time."

---
# INITIALIZATION
# File: UIT_ROUND.py, lines 45-64
# How the neuron starts before any training.

initialization:
  input_weights:
    method: "Random (Kaiming uniform)"
    why: "Standard practice for input connections"
  recurrent_weights:
    method: "All zeros"
    why: "The neuron starts with no recurrent memory. Recurrence emerges through learning."
  bias:
    method: "First half zeros, second half spread evenly around the circle"
    formula: "bias[hidden + j] = j * (2π / hidden_size)"
    why: "Each neuron starts at a different angle. This allows the network to explore the entire circle from the first step."
  epsilon:
    method: "Small values with exponential decay: 0.125 * 0.5^(j mod 5)"
    why: "The rotational coupling starts weak. The neuron must earn its influence through training."
  harmonic_weights:
    method: "Random uniform between 0 and 1"
    why: "Each neuron starts with a random mix of frequency sensitivities"

---
# EXACT REVERSIBILITY (Binary Mode)
# Implementation: UIT_ROUND.py (use_binary_alignment)
# In this mode, the neuron can reverse its own computation perfectly.

reversibility:
  encoding:
    method: "Half-Shift Winding"
    formula: "phi_next = (phi_prev * 0.5) + (bit * pi)"
    description: "Bits are packed into the angle by halving the current state and adding a rotation for each new bit."
  decoding:
    method: "Double-Shift Unwinding"
    formula: "bit = 1 if phi >= pi, then double the remainder."
    description: "Bits are extracted by checking which side of the circle the angle is on, then doubling the angle to reveal the next bit."
  proof: "This is proven by the ASCII loop test, where 256 characters are recovered with 100% accuracy. Standard models cannot do this because they permanently lose data during processing."
  logic: "Since the math is perfectly reversible, we can train one direction and flip the weights to solve the other, saving massive amounts of training time."

---
# SUMMARY OF PROVEN RESULTS

benchmarks:
  counting_and_logic:
    test: "16-bit Parity"
    result: "100% accuracy using exactly ONE neuron."
    advantage: "A standard GRU model needs dozens of neurons to do this and still fails frequently."
    insight: "Logical counting is a rotation on a circle. Because ROUND is circular, the task is trivial."

  continuous_tracking:
    test: "Sine Wave Recovery"
    result: "10-fold improvement in precision over standard models."
    insight: "The model tracks moving waves by riding them on a circular track instead of guessing points."

  composition:
    test: "Color Algebra & Prism Stacking"
    result: "Near-instant solving of modular addition and midpoint logic."
    insight: "The network solves geometric problems by physically rotating its internal state to the correct position."

---
# CONFIDENCE AND LOCKING
# Implementation: config.py and UIT_ROUND.py

mechanisms:
  confidence:
    formula: "average absolute value of the cosine projection"
    meaning: "How close the neuron is to a stable resting position."
    function: "Confident neurons learn more slowly. This prevents the model from over-correcting once it has found a solution."
  locking:
    method: "Gaussian Annealing"
    meaning: "A temporary force that pulls the neuron toward stable points during the middle of training."
    function: "Acts like training wheels, helping the phase settle into a clean geometric attractor."

---
# THE CORE CLAIM

core_claim:
  statement: "UIT_ROUND is a recurrent neural network where the internal representation is the U-space number system. The classical output and the rotation are actual computed quantities, not metaphors."
  evidence:
    - "The output formula maps directly to the mathematical definition of U-space."
    - "Phase angles provide exact reversibility for encoding and decoding."
    - "The model handles circular tasks (counting, color mixing) with perfect precision using minimal resources."
    - "Independently trained models develop compatible geometric languages."
